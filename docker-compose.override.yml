services:
  app:
    volumes:
      - ./:/app:delegated
      - vendor:/app/vendor
      - node_modules:/app/node_modules
    environment:
      APP_DEBUG: 'true'
      APP_ENV: local
    command: sh -c "npm run css:watch &; frankenphp --host=0.0.0.0 --port=80 -t public"

  updater:
    image: alpine:latest
    container_name: siwayut-updater-dev
    depends_on:
      - db
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      GIT_TERMINAL_PROMPT: 0
    entrypoint: [sh, -c]
    command: [apk add --no-cache git && echo '*/15 * * * * /app/scripts/cron-update-repo.sh >> /var/log/cron.log 2>&1' > /etc/crontabs/root && touch /var/log/cron.log && crond -f -L /dev/stdout]

volumes:
  vendor:
  node_modules:
