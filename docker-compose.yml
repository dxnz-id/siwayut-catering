services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siwayut-app
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8080
      DB_DRIVER: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: siwayut_catering
      DB_USERNAME: root
      DB_PASSWORD: root
    volumes:
      - ./:/app:delegated
      - vendor:/app/vendor
      - node_modules:/app/node_modules
    command: sh -c "composer install --no-interaction --prefer-dist && npm install && npm run css:build && frankenphp --host=0.0.0.0 --port=80 -t public"

  db:
    image: mariadb:10.11
    container_name: siwayut-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: siwayut_catering
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: siwayut-phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"

  updater:
    image: node:18-alpine
    container_name: siwayut-updater
    depends_on:
      - db
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      GIT_TERMINAL_PROMPT: 0
    entrypoint: ["sh", "-c"]
    command: ["apk add --no-cache git && echo '*/15 * * * * /app/scripts/cron-update-repo.sh >> /var/log/cron.log 2>&1' > /etc/crontabs/root && touch /var/log/cron.log && crond -f -L /dev/stdout"]

volumes:
  vendor:
  node_modules:
  db_data:
